name: Release to PyPI

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)publish (e.g. v0.3.3)'
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build
        run: |
          rm -rf dist/
          uv build
          ls -la dist/

      - name: Verify version matches tag
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          EXPECTED="${TAG#v}"
          ACTUAL=$(grep '^version' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Tag $TAG implies version $EXPECTED, but pyproject.toml has $ACTUAL"
            exit 1
          fi
          echo "Tag $TAG matches pyproject.toml version $ACTUAL"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via OIDC trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
